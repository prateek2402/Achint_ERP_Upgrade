[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q
markers =
    e2e: browser-driven end-to-end regression tests
filterwarnings =
    # google-generativeai is being phased out; we only fall back to it when the
    # new google-genai SDK is unavailable. Tests do not exercise the deprecated
    # path, so silence the noise to keep CI output focused.
    ignore::FutureWarning
    ignore::DeprecationWarning
