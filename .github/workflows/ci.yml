name: CI

# Runs the full backend + browser test suite on every push and pull request
# targeting any branch. A green run here is the contract for "safe to merge".

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

# Auto-cancel previous runs for the same ref when a new commit lands; keeps
# CI minutes lean while still gating every change a developer pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Cache Playwright browser binaries across runs (~150 MB chromium).
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Lint (ruff, non-blocking for now)
        # Tier 2G keeps lint advisory until Workstream B finishes the SPA carve-out.
        # Flip `continue-on-error` to false once the warning surface is clean.
        continue-on-error: true
        run: |
          pip install "ruff==0.7.4"
          ruff check .

      - name: Run test suite (pytest + Playwright e2e)
        env:
          # Force deterministic config in CI; tests still override per-fixture.
          APP_ENV: test
          LOG_LEVEL: WARNING
          KEEP_BACKUPS_DAYS: "0"
        run: |
          python -m pytest -v --color=yes

      - name: Upload pytest junit report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ github.run_id }}
          path: |
            .pytest_cache
            db_backups/drill_report_*.json
          if-no-files-found: ignore
          retention-days: 7
